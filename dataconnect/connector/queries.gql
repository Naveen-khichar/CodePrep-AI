# GraphQL queries for CodePrep AI dynamic data fetching

# Fetch complete dashboard metrics and recent submissions
query GetDashboardStats($userId: String!) @auth(level: USER) {
  progress(key: { userId: $userId }) {
    submissionsCount
    streak
    lastSubmissionDate
    accuracy
    favoriteLanguage
    totalTimeSpent
  }
  submissions(where: { userId: { eq: $userId } }, limit: 5, orderBy: [{ timestamp: DESC }]) {
    id
    problemId
    problemTitle
    language
    verdict
    runtime
    memory
    timestamp
  }
  solvedProblems(where: { userId: { eq: $userId } }) {
    problemId
  }
}

# Fetch complete submissions log for historical lists
query GetSubmissionsHistory($userId: String!) @auth(level: USER) {
  submissions(where: { userId: { eq: $userId } }, orderBy: [{ timestamp: DESC }]) {
    id
    problemId
    problemTitle
    language
    verdict
    runtime
    memory
    timestamp
    code
    errorMessage
  }
}

# Fetch submissions specific to a single coding problem
query GetProblemSubmissions($userId: String!, $problemId: String!) @auth(level: USER) {
  submissions(where: { userId: { eq: $userId }, problemId: { eq: $problemId } }, orderBy: [{ timestamp: DESC }]) {
    id
    language
    verdict
    runtime
    memory
    timestamp
  }
}
